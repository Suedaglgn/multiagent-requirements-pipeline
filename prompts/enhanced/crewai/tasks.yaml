# CrewAI task prompts - Enhanced level
# {project_description}, {approved_requirements}, {approved_ra}, {feedback} are runtime
# variables filled in at execution time.

extract_task:
  description: >
    Analyze the following raw project description and create detailed list of requirements.

    Project Input:
    {project_description}

    The output must be a concise, bulleted list organized into exactly these categories:
    1. **Functional Requirements (FRs)**
    2. **Non-Functional Requirements (NFRs)**
    3. **Technical Constraints**
    4. **User Personas**
    5. **Potential Edge Cases**
    
    Guidelines:
    - Extract only what is explicitly or reasonably implied by the input.
    - Keep items atomic — one requirement per bullet.
    - Use English only.
    - Output only the categorized list, no preamble.

    If user feedback on a previous draft is provided below, incorporate ALL requested changes.
    User Feedback: {feedback}
  expected_output: >
    Output only the categorized list, no preamble.

ra_task:
  description: >
    Approved Requirements:
    {approved_requirements}

    Write a **long, detailed Software Requirements Specification (SRS)** in Markdown. 

    Include these sections (use Markdown tables with hierarchical IDs like FR-AUTH-001 for all requirements):
    1. Introduction 
    2. Functional Requirements 
    3. Non-Functional Requirements 
    4. Technical Constraints & Integration
    5. User Personas & Use Cases 
    6. Edge Cases, Risks, and Gaps
    7. Assumptions
    8. Traceability Matrix

    Guidelines:
    - Ensure every requirement is SMART (Specific, Measurable, Achievable, Relevant, Testable).
    - Expand bullet points into professional, development-team-ready prose.
    - Use English only.

    If user feedback on a previous draft is provided below, incorporate ALL requested changes.
    User Feedback: {feedback}
  expected_output: >
    A long and detailed, comprehensive Markdown SRS document with many detailed requirements in tables. Output only the Markdown (RA.md content), no preamble.

de_task:
  description: >
    Approved RA Document:
    {approved_ra}

    Write a **long, detailed Design & Estimation document** in Markdown based on the RA above. 

    Include these sections (use Markdown tables for all structured data, reference RA requirement IDs throughout):
    1. Executive Summary
    2. System Architecture 
    3. Technology Stack 
    4. Infrastructure & Deployment 
    5. Data Flows for key use cases 
    6. Database Schema Overview
    7. API Surface Overview
    8. Development Effort Estimation 
    9. Technical Risks & Mitigation
    10. Security Architecture
    11. Monitoring & Observability
    12. Cost Estimation (monthly breakdown in USD)
    13. Recommendations & Next Steps
    14. Traceability Matrix

    If user feedback on a previous draft is provided below, incorporate ALL requested changes.
    User Feedback: {feedback}
  expected_output: >
    A long and detailed, comprehensive Markdown DE document with architecture, tech stack, estimates, costs, and traceability. Output only the Markdown (DE.md content), no preamble.
